# ─────────────────────────────────────────────
# app.conf — Development environment defaults
# Override any value via environment variables
# ─────────────────────────────────────────────

# Application
APP_ENV=development
APP_NAME=AppConfigManager
APP_VERSION=1.0.0

# Database
DB_HOST=localhost
DB_PORT=5432
DB_NAME=appdb_dev
DB_USER=devuser
DB_PASSWORD=changeme   # override via env: DB_PASSWORD=real_password

# Logging
LOG_LEVEL=DEBUG
LOG_FILE=/var/log/app/app.log

# Server
SERVER_HOST=0.0.0.0
SERVER_PORT=8080

# Feature Flags
FEATURE_DARK_MODE=true
FEATURE_BETA_API=false
